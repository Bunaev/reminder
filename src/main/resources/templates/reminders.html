<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminder App - Мои напоминания</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/keycloak-theme.css">
</head>
<body>
<div class="reminder-container">
    <div class="content-card">
        <!-- Хедер с кнопкой logout -->
        <div class="card-header">
            <h2>
                <i class="bi bi-bell-fill" style="margin-right: 10px;"></i>
                Мои напоминания
            </h2>
            <div>
                <a href="/logout" class="logout-btn">
                    <i class="bi bi-box-arrow-right"></i> Выйти
                </a>
            </div>
        </div>

        <!-- Форма создания нового напоминания -->
        <div class="create-form">
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="title" class="form-control" placeholder="Заголовок" maxlength="50">
                </div>
                <div class="form-group">
                    <input type="text" id="description" class="form-control" placeholder="Описание" maxlength="200">
                </div>
                <div class="form-group">
                    <input type="datetime-local" id="deadline" class="form-control">
                </div>
                <button class="btn-primary" onclick="createReminder()">
                    <i class="bi bi-plus-circle"></i> Создать
                </button>
            </div>
        </div>
        <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
            <div style="background: white; width: 500px; margin: 100px auto; padding: 30px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <h3 style="margin-top: 0; color: #1e3c72;">Редактировать напоминание</h3>
                <input type="hidden" id="editId">

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #495057;">Заголовок</label>
                    <input type="text" id="editTitle" class="form-control" maxlength="50">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: #495057;">Описание</label>
                    <input type="text" id="editDescription" class="form-control" maxlength="200">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; color: #495057;">Дедлайн</label>
                    <input type="datetime-local" id="editDeadline" class="form-control">
                </div>

                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button class="btn-primary" onclick="updateReminder()">Сохранить</button>
                    <button class="btn-danger" onclick="closeEditModal()">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Фильтры и поиск -->
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="btn-outline-secondary active" onclick="loadReminders('all', 0)" id="filter-all">
                    <i class="bi bi-list"></i> Все
                </button>
                <button class="btn-outline-secondary" onclick="loadReminders('today', 0)" id="filter-today">
                    <i class="bi bi-calendar-day"></i> Сегодня
                </button>
                <button class="btn-outline-secondary" onclick="loadReminders('expired', 0)" id="filter-expired">
                    <i class="bi bi-exclamation-triangle"></i> Просроченные
                </button>
                <button class="btn-outline-secondary" onclick="loadReminders('future', 0)" id="filter-future">
                    <i class="bi bi-calendar-check"></i> Будущие
                </button>
            </div>

            <!-- Поиск по дате -->
            <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <input type="date" id="searchDeadline" class="form-control" placeholder="Выберите дату">
                </div>
                <button class="btn-outline-secondary" onclick="searchByDeadline()">
                    <i class="bi bi-search"></i> Найти по дедлайну
                </button>
            </div>

            <!-- Поиск по диапазону дат -->
            <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <input type="datetime-local" id="startDate" class="form-control" placeholder="Начало">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <input type="datetime-local" id="endDate" class="form-control" placeholder="Конец">
                </div>
                <button class="btn-outline-secondary" onclick="searchByDateRange()">
                    <i class="bi bi-calendar-range"></i> Найти за период
                </button>
            </div>

            <!-- Поиск по тексту -->
            <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <input type="text" id="searchTitle" class="form-control" placeholder="Поиск по заголовку">
                </div>
                <button class="btn-outline-secondary" onclick="searchByTitle()">
                    <i class="bi bi-search"></i> Найти
                </button>
            </div>
            <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <input type="text" id="searchDescription" class="form-control" placeholder="Поиск по описанию">
                </div>
                <button class="btn-outline-secondary" onclick="searchByDescription()">
                    <i class="bi bi-search"></i> Найти
                </button>
            </div>
        </div>

        <!-- Список напоминаний -->
        <div id="remindersList">
            <!-- JS заполнит -->
        </div>

        <!-- Пагинация -->
        <div id="pagination" class="pagination-section">
            <!-- JS заполнит -->
        </div>
    </div>
</div>

<!-- Загрузка -->
<div id="loading" class="loading" style="display: none;">
    <i class="bi bi-arrow-repeat"></i> Загрузка...
</div>

<script>
    // Состояние приложения
    let currentFilter = 'all';
    let currentPage = 0;
    let currentSortBy = 'deadline';
    let currentDirection = 'asc';

    // Загружаем напоминания при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadReminders('all', 0);
    });

    /**
     * ЗАГРУЗКА ВСЕХ НАПОМИНАНИЙ С ПАГИНАЦИЕЙ И СОРТИРОВКОЙ
     * GET /api/v1/reminder?page=0&size=10&sortBy=deadline&direction=asc
     */
    function loadReminders(filter, page) {
        // 👇 ЗАЩИТА ОТ НЕКОРРЕКТНЫХ ЗНАЧЕНИЙ
        if (page === undefined || page === null || isNaN(page) || page < 0) {
            page = 0;
        }

        currentFilter = filter;
        currentPage = page;

        document.getElementById('loading').style.display = 'block';

        let url = '/api/v1/reminder';

        if (filter === 'today') {
            url = '/api/v1/reminder/filter/today';
        } else if (filter === 'expired') {
            url = '/api/v1/reminder/filter/expired';
        } else if (filter === 'future') {
            url = '/api/v1/reminder/filter/future';
        }

        const safePage = Number.isInteger(page) && page >= 0 ? page : 0;
        url += `?page=${safePage}&size=8&sortBy=${currentSortBy}&direction=${currentDirection}`;

        console.log('Запрос к:', url);

        fetch(url, { credentials: 'include' })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка загрузки');
                return response.json();
            })
            .then(data => {
                displayReminders(data.content);
                displayPagination(data.page);
                updateActiveFilterButton(filter);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('remindersList').innerHTML =
                    '<div class="alert alert-warning">Ошибка загрузки напоминаний</div>';
                document.getElementById('loading').style.display = 'none';
            });
    }

    /**
     * ПОИСК ПО ЗАГОЛОВКУ
     * GET /api/v1/reminder/search/by-title/{title}
     */
    function searchByTitle() {
        const title = document.getElementById('searchTitle').value.trim();
        if (!title) {
            alert('Введите заголовок для поиска');
            return;
        }

        document.getElementById('loading').style.display = 'block';

        fetch(`/api/v1/reminder/search/by-title/${encodeURIComponent(title)}`, {
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка поиска');
                return response.json();
            })
            .then(reminders => {
                if (reminders && reminders.length > 0) {
                    displayReminders(reminders);  // передаём весь массив
                    document.getElementById('pagination').innerHTML = '';
                } else {
                    document.getElementById('remindersList').innerHTML =
                        '<div class="alert alert-info">Напоминания не найдены</div>';
                }
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('remindersList').innerHTML =
                    '<div class="alert alert-warning">Ошибка поиска</div>';
                document.getElementById('loading').style.display = 'none';
            });
    }

    function searchByDescription() {
        const description = document.getElementById('searchDescription').value.trim();
        if (!description) {
            alert('Введите описание для поиска');
            return;
        }

        document.getElementById('loading').style.display = 'block';

        fetch(`/api/v1/reminder/search/by-description/${encodeURIComponent(description)}`, {
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка поиска');
                return response.json();
            })
            .then(reminders => {
                if (reminders && reminders.length > 0) {
                    displayReminders(reminders);
                    document.getElementById('pagination').innerHTML = '';
                } else {
                    document.getElementById('remindersList').innerHTML =
                        '<div class="alert alert-info">Напоминания не найдены</div>';
                }
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('remindersList').innerHTML =
                    '<div class="alert alert-warning">Ошибка поиска</div>';
                document.getElementById('loading').style.display = 'none';
            });
    }

    /**
     * ПОИСК ПО ДИАПАЗОНУ ДАТ
     * GET /api/v1/reminder/filter/range?startDate=...&endDate=...
     */
    function searchByDateRange() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        if (!startDate || !endDate) {
            alert('Введите начальную и конечную даты');
            return;
        }

        document.getElementById('loading').style.display = 'block';

        // Преобразуем в ISO формат
        const start = new Date(startDate).toISOString();
        const end = new Date(endDate).toISOString();

        fetch(`/api/v1/reminder/filter/range?startDate=${encodeURIComponent(start)}&endDate=${encodeURIComponent(end)}&page=0&size=6`, {
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка поиска');
                return response.json();
            })
            .then(data => {
                displayReminders(data.content);
                displayPagination(data.page);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('remindersList').innerHTML =
                    '<div class="alert alert-warning">Ошибка поиска</div>';
                document.getElementById('loading').style.display = 'none';
            });
    }

    /**
     * ПОИСК ПО ДЕДЛАЙНУ
     * GET /api/v1/reminder/search/by-deadline/{deadline}
     */
    /**
     * ПОИСК ПО ДЕДЛАЙНУ (ТОЛЬКО ДАТА)
     * GET /api/v1/reminder/search/by-deadline/{deadline}
     */
    function searchByDeadline() {
        const date = document.getElementById('searchDeadline').value;
        if (!date) {
            alert('Выберите дату');
            return;
        }

        document.getElementById('loading').style.display = 'block';

        // Добавляем время к дате
        const dateTime = date + 'T00:00:00';

        fetch(`/api/v1/reminder/search/by-deadline/${encodeURIComponent(dateTime)}`, {
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка поиска');
                return response.json();
            })
            .then(reminders => {
                if (reminders && reminders.length > 0) {
                    displayReminders(reminders);
                    document.getElementById('pagination').innerHTML = '';
                } else {
                    document.getElementById('remindersList').innerHTML =
                        '<div class="alert alert-info">Напоминания не найдены</div>';
                }
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('remindersList').innerHTML =
                    '<div class="alert alert-warning">Ошибка поиска</div>';
                document.getElementById('loading').style.display = 'none';
            });
    }

    /**
     * СОЗДАНИЕ НОВОГО НАПОМИНАНИЯ
     * POST /api/v1/reminder
     */
    function createReminder() {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const deadline = document.getElementById('deadline').value;

        if (!title || !description || !deadline) {
            alert('Пожалуйста, заполните все поля');
            return;
        }

        // Преобразуем строку из input в объект Date
        const selectedDate = new Date(deadline + ':00');
        const now = new Date();

        // Проверяем, что дата в будущем (сравниваем миллисекунды)
        if (selectedDate <= now) {
            alert('❌ Дедлайн должен быть в будущем!\nВы выбрали: ' + selectedDate.toLocaleString('ru-RU'));
            return;
        }

        const reminder = {
            title: title,
            description: description,
            deadline: deadline + ':00'
        };

        document.getElementById('loading').style.display = 'block';

        fetch('/api/v1/reminder', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify(reminder)
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка создания');
                // Очищаем форму
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('deadline').value = '';
                // Возвращаемся к списку всех напоминаний
                loadReminders('all', 0);
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Ошибка при создании напоминания');
            })
            .finally(() => {
                document.getElementById('loading').style.display = 'none';
            });
    }

    /**
     * УДАЛЕНИЕ НАПОМИНАНИЯ
     * DELETE /api/v1/reminder/{id}
     */
    function deleteReminder(id) {
        if (!confirm('Удалить напоминание?')) return;

        fetch(`/api/v1/reminder/${id}`, {
            method: 'DELETE',
            credentials: 'include'
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка удаления');
                // Перезагружаем текущий список
                loadReminders(currentFilter, currentPage);
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Ошибка при удалении');
            });
    }

    /**
     * Отображение напоминаний
     */
    function displayReminders(reminders) {
        const container = document.getElementById('remindersList');

        if (!reminders || reminders.length === 0) {
            container.innerHTML = '<div class="alert alert-info">Нет напоминаний</div>';
            return;
        }

        let html = '<div class="reminders-grid">';

        reminders.forEach(reminder => {
            const deadlineDate = new Date(reminder.deadline);
            const formattedDate = deadlineDate.toLocaleString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            html += `
            <div class="reminder-card" data-id="${reminder.id}">
                <div class="reminder-title">${escapeHtml(reminder.title)}</div>
                <div class="reminder-description">${escapeHtml(reminder.description)}</div>
                <div class="reminder-deadline">
                    <i class="bi bi-clock"></i>
                    <span>${formattedDate}</span>
                </div>
                <div class="reminder-actions">
                    <button class="btn-edit" onclick="openEditModal(${reminder.id}, '${escapeHtml(reminder.title)}', '${escapeHtml(reminder.description)}', '${reminder.deadline}')">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn-danger" onclick="deleteReminder(${reminder.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        `;
        });

        html += '</div>';
        container.innerHTML = html;
    }

    /**
     * Отображение пагинации
     */
    function displayPagination(pageData) {
        const container = document.getElementById('pagination');

        if (pageData.totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = '<ul class="pagination">';

        // Кнопка "Назад" — только если не первая страница
        if (pageData.number > 0) {
            const prevPage = pageData.number - 1;
            html += `<li class="page-item">
            <a class="page-link" href="#" onclick="loadReminders('${currentFilter}', ${prevPage}); return false;">← Назад</a>
        </li>`;
        }

        // Номера страниц
        for (let i = 0; i < pageData.totalPages; i++) {
            if (i === 0 || i === pageData.totalPages - 1 || Math.abs(i - pageData.number) <= 2) {
                html += `<li class="page-item ${i === pageData.number ? 'active' : ''}">
                <a class="page-link" href="#" onclick="loadReminders('${currentFilter}', ${i}); return false;">${i + 1}</a>
            </li>`;
            } else if (i === 1 && pageData.number > 3) {
                html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            } else if (i === pageData.totalPages - 2 && pageData.number < pageData.totalPages - 4) {
                html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
        }

        // Кнопка "Вперёд" — только если не последняя страница
        if (pageData.number < pageData.totalPages - 1) {
            const nextPage = pageData.number + 1;
            html += `<li class="page-item">
            <a class="page-link" href="#" onclick="loadReminders('${currentFilter}', ${nextPage}); return false;">Вперёд →</a>
        </li>`;
        }

        html += '</ul>';
        container.innerHTML = html;
    }

    /**
     * Обновление активной кнопки фильтра
     */
    function updateActiveFilterButton(filter) {
        ['all', 'today', 'expired', 'future'].forEach(f => {
            const btn = document.getElementById(`filter-${f}`);
            if (btn) {
                if (f === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            }
        });
    }

    /**
     * Экранирование HTML
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    function openEditModal(id, title, description, deadline) {
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editDescription').value = description;

        // Преобразуем ISO дату в формат datetime-local
        const date = new Date(deadline);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        document.getElementById('editDeadline').value = `${year}-${month}-${day}T${hours}:${minutes}`;

        document.getElementById('editModal').style.display = 'block';
    }

    // Закрыть модальное окно
    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    // Обновить напоминание
    function updateReminder() {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('editTitle').value.trim();
        const description = document.getElementById('editDescription').value.trim();
        const deadline = document.getElementById('editDeadline').value;

        if (!title || !description || !deadline) {
            alert('Пожалуйста, заполните все поля');
            return;
        }

        const reminder = {
            id: id,
            title: title,
            description: description,
            deadline: deadline + ':00'
        };

        document.getElementById('loading').style.display = 'block';

        fetch('/api/v1/reminder', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify(reminder)
        })
            .then(response => {
                if (!response.ok) throw new Error('Ошибка обновления');
                closeEditModal();
                loadReminders(currentFilter, currentPage);
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Ошибка:', error);
                alert('Ошибка при обновлении напоминания');
                document.getElementById('loading').style.display = 'none';
            });
    }
</script>
</body>
</html>
