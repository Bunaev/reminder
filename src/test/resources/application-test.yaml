spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: false
  mail:
    host: localhost
    port: 3025
    username: test
    password: test

telegram:
  bot:
    token: test-token
    username: test-bot

logging:
  level:
    org.springframework.security: DEBUG
    com.reminder: DEBUG
    org.testcontainers: INFO